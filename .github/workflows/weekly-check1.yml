name: Viikottainen lausuntoanalyysi

on:
  schedule:
    # Joka maanantai klo 09:00 UTC (11:00 Suomen aika kesällä)
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Voit myös ajaa manuaalisesti

jobs:
  analyze-lausunnot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Lataa repositorio
        uses: actions/checkout@v3
      
      - name: Asenna Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Asenna riippuvuudet
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Hae lausuntopyynnöt
        id: scrape
        run: |
          python src/scraper.py > /tmp/lausunnot.txt
          cat /tmp/lausunnot.txt
        env:
          PYTHONIOENCODING: utf-8
      
      - name: Analysoi lausuntopyynnöt
        id: analyze
        run: |
          python src/analyzer.py
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Luo Issue:t löydetyille lausunnoille
        run: |
          python src/github_issue_creator.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      
      - name: Päivitä processed_ids.txt
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed_ids.txt
          git commit -m "Päivitetty käsitellyt lausuntopyynnöt" || echo "Ei muutoksia committaavaksi"
          git push
